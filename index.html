<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description"
        content="Multi-region Electronic Program Guide for sports, news, and entertainment channels">
    <title>Global Guide</title>
    <link rel="icon" type="image/png" href="assets/fav.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/epg.css">
</head>

<body>
    <header class="header">
        <div id="clock" role="timer" aria-live="polite" aria-atomic="true">
            <button id="timeBack" class="time-btn" aria-label="Go back 1 hour" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <span id="timeLabel"></span>
            <button id="timeForward" class="time-btn" aria-label="Go forward 1 hour">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
        <div class="controls">
            <select id="categoryFilter" aria-label="Filter by category">
                <option value="all">All Channels</option>
                <option value="sport">Sport</option>
                <option value="entertainment">Entertainment</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="movies">Movies</option>
                <option value="news">News</option>
            </select>
            <select id="regionFilter" aria-label="Filter by region">
                <option value="all">All Regions</option>
                <option value="NZ">New Zealand</option>
                <option value="UK">United Kingdom</option>
                <option value="AU">Australia</option>
                <option value="US">United States</option>
            </select>
        </div>
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Search programs..." aria-label="Search programs" autocomplete="off" />
        </div>
        <!-- Mobile only -->
        <div class="mobile-controls">
            <select id="categoryFilterMobile" aria-label="Filter by category">
                <option value="all">All Channels</option>
                <option value="sport">Sport</option>
                <option value="entertainment">Entertainment</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="movies">Movies</option>
                <option value="news">News</option>
            </select>
            <select id="regionFilterMobile" aria-label="Filter by region">
                <option value="all">All Regions</option>
                <option value="NZ">New Zealand</option>
                <option value="UK">United Kingdom</option>
                <option value="AU">Australia</option>
                <option value="US">United States</option>
            </select>
            <span class="mobile-divider"></span>
            <button id="searchToggle" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </div>
        <div class="mobile-search-bar">
            <input type="text" id="searchInputMobile" placeholder="Search programs..." aria-label="Search programs" autocomplete="off" />
            <span class="mobile-divider"></span>
            <button id="searchClose" aria-label="Close search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
    </header>
    <main id="epg" aria-label="Electronic Program Guide"></main>

    <div id="debug-slider" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--color-bg-secondary);border:1px solid var(--color-border-light);border-radius:var(--radius-md);padding:10px 14px;flex-direction:column;gap:8px;font-size:12px;color:var(--color-text-tertiary);">
        <div style="display:flex;align-items:center;gap:10px;">
            <label for="scaleSlider" style="white-space:nowrap;min-width:40px;">Grid</label>
            <input type="range" id="scaleSlider" min="0.5" max="2" step="0.05" value="1" style="width:120px;accent-color:var(--color-accent);">
            <span id="scaleValue" style="min-width:32px;color:var(--color-accent);">1×</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <label for="headerScaleSlider" style="white-space:nowrap;min-width:40px;">Header</label>
            <input type="range" id="headerScaleSlider" min="0.5" max="2" step="0.05" value="1" style="width:120px;accent-color:var(--color-accent);">
            <span id="headerScaleValue" style="min-width:32px;color:var(--color-accent);">1×</span>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
